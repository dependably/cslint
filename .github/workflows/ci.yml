# GitHub Actions CI for cslint (.NET global tool) — part of the Dependably suite.
#
# Public-facing CI that runs on the GitHub mirror (github.com/dependably/cslint). GitLab
# remains the source of truth; its pipeline mirrors `main` here via a manual job, and
# GitHub CI then runs on the pushed commit and on community pull requests.
#
# Jobs:
#   secret-scan   TruffleHog verified-secret scan (same pinned digest as the suite)
#   format        `dotnet format --verify-no-changes` (enforced)
#   build-test    restore + build + integration tests (tests/RunTests.sh)
#   sbom          production-only CycloneDX 1.6 SBOM, uploaded as a build artifact
#   release       (tags v* only) pack the .nupkg, emit SLSA build provenance
#                 (keyless OIDC/sigstore), then publish it — SLSA Build L2. Also
#                 signs + attaches the production SBOM to the GitHub Release.
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: TruffleHog secret scan
        run: |
          set -eu
          IMAGE="trufflesecurity/trufflehog:3.95.3@sha256:9cc33bb080cac0efbbf228a17667172875b529eeeab01efcc4697adfb55f568a"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          run_th() {
            docker run --rm -v "$PWD:/repo" -w /repo \
              -e GIT_CONFIG_COUNT=1 -e GIT_CONFIG_KEY_0=safe.directory -e GIT_CONFIG_VALUE_0=/repo \
              "$IMAGE" "$@"
          }
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            echo "No usable base commit (first push / force-push) — scanning full history"
            run_th git file:///repo --only-verified --fail
          else
            echo "Scanning new commits since $BASE"
            run_th git file:///repo --since-commit "$BASE" --only-verified --fail
          fi

  # Enforced: cslint's source is `dotnet format` clean and must stay that way.
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet format cslint.csproj --verify-no-changes

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore cslint.csproj --locked-mode
      - run: dotnet build cslint.csproj -c Release --no-restore
      # Unit tests (xUnit) exercise the internal rule/engine surface directly.
      - run: dotnet test tests/CsLint.Tests/CsLint.Tests.csproj -c Release
      # Integration tests run the packed tool against the fixtures.
      - run: dotnet pack cslint.csproj -c Release --no-restore -o artifacts
      - run: dotnet tool install --global --add-source artifacts Dependably.CsLint
      - run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          bash tests/RunTests.sh

  # Production-dependency CycloneDX 1.6 SBOM, uploaded as a build artifact on every
  # run (push / PR / tag). `--exclude-dev` drops test/analyzer/dev packages, so the
  # SBOM reflects exactly what ships in the .nupkg. On a `v*` tag the release job below
  # downloads this same sbom.json, signs it, and attaches it to the GitHub Release. The
  # CycloneDX .NET tool is version-pinned so the SBOM output stays reproducible.
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet tool install --global CycloneDX --version 6.2.0
      - run: dotnet CycloneDX cslint.csproj -o . -fn sbom.json -F json -spv 1.6 --exclude-dev
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
          retention-days: 7

  # Release the .nupkg with signed SLSA build provenance — runs only on a `v*` tag, after
  # the gating jobs pass. Keyless OIDC/sigstore attestation covers the exact packed bytes:
  #   gh attestation verify <file>.nupkg -R dependably/cslint
  release:
    needs: [secret-scan, format, build-test, sbom]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload the .nupkg
      id-token: write # OIDC token: keyless sigstore signing + nuget.org Trusted Publishing
      attestations: write # store the provenance attestation on the repo
    env:
      # nuget.org profile name for Trusted Publishing (OIDC). When unset, the publish
      # steps self-skip and only provenance + the GitHub Release are produced.
      NUGET_USER: ${{ secrets.NUGET_USER }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore cslint.csproj --locked-mode
      - run: dotnet pack cslint.csproj -c Release --no-restore -o artifacts
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "artifacts/*.nupkg"
      # Publish to nuget.org via Trusted Publishing (OIDC) — no long-lived API key.
      # The id-token above is exchanged for a short-lived, single-use nuget.org key at
      # publish time. Requires a Trusted Publishing policy on nuget.org (Repository
      # Owner: dependably, Repository: cslint, Workflow File: ci.yml) plus the nuget.org
      # profile name in the NUGET_USER secret. Both steps skip (not fail) when NUGET_USER
      # is unset, so provenance + the GitHub Release still produce before publishing is
      # configured. Pinned to a full commit SHA (v1).
      - name: NuGet login (Trusted Publishing → short-lived key)
        id: nuget-login
        if: env.NUGET_USER != ''
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Publish to nuget.org
        if: env.NUGET_USER != ''
        run: |
          set -eu
          dotnet nuget push artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --skip-duplicate
      - name: Publish .nupkg to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          gh release create "$GITHUB_REF_NAME" artifacts/*.nupkg \
            --title "$GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" artifacts/*.nupkg --clobber
      # Production-dependency SBOM: pull the exact bytes the `sbom` job produced, sign
      # them with the same keyless OIDC/sigstore flow, and attach the SBOM plus its
      # sigstore bundle to the Release so consumers can verify what shipped:
      #   gh attestation verify sbom.json -R dependably/cslint
      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: .
      - name: Attest SBOM
        id: attest_sbom
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: sbom.json
      - name: Attach signed SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          cp "${{ steps.attest_sbom.outputs.bundle-path }}" sbom.json.sigstore.json
          gh release upload "$GITHUB_REF_NAME" sbom.json sbom.json.sigstore.json --clobber
