name: csedlint

on:
  pull_request:
    paths:
      - '**.cs'
      - '.editorconfig'

jobs:
  editorconfig-sast:
    name: EditorConfig + SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install csedlint
        run: dotnet tool install --global csedlint

      - name: Lint changed files
        run: csedlint --sast --strict --format github --unstaged

  semantic:
    name: Semantic analysis
    runs-on: ubuntu-latest
    needs: editorconfig-sast
    if: success()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore and build
        run: dotnet build

      - name: Install csedlint
        run: dotnet tool install --global csedlint

      - name: Semantic lint
        run: csedlint --deep --project ${{ env.PROJECT_FILE }} --strict --format github
        env:
          PROJECT_FILE: src/MyApp.csproj
